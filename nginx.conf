server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /assets/ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
  }

  location = /favicon.svg {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
  }

  location = /logo.svg {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
  }
}
