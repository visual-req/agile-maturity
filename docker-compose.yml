services:
  mysql:
    image: mysql:8.0
    container_name: agile-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: agile_maturity
      MYSQL_USER: agile
      MYSQL_PASSWORD: agile123
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: agile-backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: agile
      DB_PASSWORD: agile123
      DB_NAME: agile_maturity
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agile-frontend
    restart: unless-stopped
    ports:
      - "9880:80"
    depends_on:
      - backend

volumes:
  mysql_data:
